id: https://w3id.org/brc/osti_cedar
name: osti_cedar
title: CEDAR-aligned OSTI Submission Metadata
description: >-
  A CEDAR-friendly LinkML profile of the OSTI (E-Link 2.0) submission schema.
  This is the "CEDAR-compatible version" of the OSTI model: it keeps the
  submitter- and reader-facing bibliographic fields that real OSTI records
  actually populate (surveyed across ~100 live public records), flattens the
  parts of OSTI that do not map cleanly onto a CEDAR form (a person's name is
  one field, not first/middle/last; a single contact email instead of a list;
  award numbers lifted into nested identifier objects), and drops the internal
  E-Link bookkeeping/readonly fields (added_by*, edited_by*, date_released_*,
  audit_logs, workflow_status, ...) that a submitter never fills in.

  Data conforming to this schema is trivially wrapped into a CEDAR instance for
  the matching CEDAR template (see scripts/to_cedar_instance.py). The
  osti_schema -> osti_cedar mapping is declared in
  transform/osti_to_cedar.transform.yaml and executed with linkml-map.
version: "0.2.0"

prefixes:
  linkml: https://w3id.org/linkml/
  osti_cedar: https://w3id.org/brc/osti_cedar/
default_prefix: osti_cedar
default_range: string

imports:
  - linkml:types

classes:

  RecordCollection:
    description: A collection of CEDAR-aligned OSTI records.
    tree_root: true
    attributes:
      records:
        description: The OSTI records in this collection.
        range: OSTIRecord
        multivalued: true
        inlined_as_list: true

  OSTIRecord:
    description: >-
      A single OSTI submission record, reshaped for CEDAR. Field keys match the
      keys of the generated CEDAR template so that instance wrapping is
      mechanical.
    attributes:

      # --- identity & type ---------------------------------------------
      osti_id:
        description: The OSTI identifier for this record.
        range: integer
      title:
        description: Title of the record.
        required: true
      description:
        description: Description or abstract for this record.
      product_type:
        description: OSTI product type code (e.g. DA, JA, TR).
      product_type_term:
        description: >-
          Ontology term for the product type, resolved from the OSTI code
          (best match across any ontology; filled by scripts/enrich_terms.py).
        range: uri
        annotations:
          cedar_field_type: controlled-term
          cedar_ontology_acronym: NCIT
          cedar_ontology_name: National Cancer Institute Thesaurus
          cedar_ontology_iri: https://data.bioontology.org/ontologies/NCIT
      product_type_other:
        description: Free-text product type, when product_type is OTHER.
      dataset_type:
        description: Dataset sub-type (e.g. Instrument), for datasets.

      # --- dates -------------------------------------------------------
      publication_date:
        description: Date of publication of this record.
        range: date
      publication_date_text:
        description: Free-text form of the publication date (e.g. "Summer 2001").
      entry_date:
        description: Date the record was entered into the OSTI system.
        range: date

      # --- identifiers & links -----------------------------------------
      doi:
        description: The DOI for this record, if any.
      osti_landing_url:
        description: The OSTI landing page for this record, derived from its OSTI ID.
        range: uri
      full_text_url:
        description: URL to the full text / dataset landing page, if any.
        range: uri

      # --- provenance & access -----------------------------------------
      site_ownership_code:
        description: Code of the DOE site submitting this document.
      country_publication_code:
        description: Country of publication code for this record.
      country_term:
        description: >-
          Ontology term for the country of publication (best match across any
          ontology; filled by scripts/enrich_terms.py).
        range: uri
        annotations:
          cedar_field_type: controlled-term
          cedar_ontology_acronym: NCIT
          cedar_ontology_name: National Cancer Institute Thesaurus
          cedar_ontology_iri: https://data.bioontology.org/ontologies/NCIT
      language:
        description: Language(s) of this record.
        multivalued: true
      language_term:
        description: >-
          Ontology term for the (first) language (best match across any
          ontology; filled by scripts/enrich_terms.py).
        range: uri
        annotations:
          cedar_field_type: controlled-term
          cedar_ontology_acronym: NCIT
          cedar_ontology_name: National Cancer Institute Thesaurus
          cedar_ontology_iri: https://data.bioontology.org/ontologies/NCIT
      availability:
        description: Availability information for this record.
      access_limitations:
        description: Access/distribution limitation codes for this record.
        multivalued: true
        required: true
      doe_funded_flag:
        description: Whether the record is primarily DOE-funded (Y/N).

      # --- bibliographic (journal / book) ------------------------------
      edition:
        description: Edition number, if applicable.
      volume:
        description: Volume number, if applicable.
      issue:
        description: Issue number, if applicable.
      journal_name:
        description: Name of the journal publishing this record, if applicable.
      journal_type:
        description: Journal article sub-type code (e.g. AM, FT), if applicable.
      journal_issn:
        description: ISSN of the journal, if applicable.
      article_type:
        description: Legacy journal article type, if applicable.
      publisher:
        description: Publisher information, if applicable.
      bibliographic_citation:
        description: Free-text bibliographic citation / relation, if provided.

      # --- conference / report -----------------------------------------
      conference_title:
        description: Title of the conference, if applicable.
      conference_information:
        description: Free-text conference information, if applicable.
      conference_location:
        description: Location of the conference, if applicable.
      conference_date:
        description: Date(s) of the conference, if applicable.
      report_types:
        description: Report type code(s), if applicable.
        multivalued: true
      format_information:
        description: Format / technical requirements information, if applicable.

      # --- descriptive -------------------------------------------------
      keywords:
        description: Key words for this record.
        multivalued: true
      subject_category_codes:
        description: Subject category codes / descriptors for this record.
        multivalued: true

      # --- people & organizations --------------------------------------
      persons:
        description: People (authors, contributors, contacts) for this record.
        range: CedarPerson
        multivalued: true
        inlined_as_list: true
      organizations:
        description: Organizations (sponsor, researching, contributing) for this record.
        range: CedarOrganization
        multivalued: true
        inlined_as_list: true
      identifiers:
        description: Identifying numbers related to this record.
        range: CedarIdentifier
        multivalued: true
        inlined_as_list: true
      related_identifiers:
        description: Related identifiers connected to this record.
        range: CedarRelatedIdentifier
        multivalued: true
        inlined_as_list: true

  CedarPerson:
    description: A person associated with the record, flattened for CEDAR.
    attributes:
      type:
        description: Person role (AUTHOR, CONTACT, CONTRIBUTING, RELEASE, ...).
        required: true
      name:
        description: Full name of the person, assembled from OSTI name parts.
      orcid:
        description: ORCID iD of the person, if any.
      email:
        description: A single contact email for the person, if any.
      affiliations:
        description: Affiliations of the person.
        range: CedarAffiliation
        multivalued: true
        inlined_as_list: true
      contributor_type:
        description: Contribution type, for CONTRIBUTING persons.

  CedarAffiliation:
    description: An affiliation (institution) of a person.
    attributes:
      name:
        description: Name of the affiliated institution.
      ror_id:
        description: ROR ID of the affiliation, if any.

  CedarOrganization:
    description: An organization associated with the record, flattened for CEDAR.
    attributes:
      type:
        description: Organization role (SPONSOR, RESEARCHING, CONTRIBUTING, AUTHOR).
        required: true
      name:
        description: Name of the organization.
        required: true
      ror_id:
        description: ROR ID of the organization, if any.
      contributor_type:
        description: Contribution type, for CONTRIBUTING organizations.
      identifiers:
        description: Award/contract identifiers for this organization (sponsors only).
        range: CedarOrgIdentifier
        multivalued: true
        inlined_as_list: true

  CedarOrgIdentifier:
    description: An award/contract identifier for a sponsoring organization.
    attributes:
      type:
        description: Identifier type (AWARD_DOI, CN_DOE, CN_NONDOE).
      value:
        description: Value of the identifier (e.g. the award/contract number).

  CedarIdentifier:
    description: An identifying number related to the record.
    attributes:
      type:
        description: Identifier type code (DOI, ISBN, CN_DOE, ...).
      value:
        description: Value of the identifier.

  CedarRelatedIdentifier:
    description: A related identifier connected to the record.
    attributes:
      type:
        description: Related identifier type (DOI, URL, arXiv, ...).
        required: true
      relation:
        description: Relationship of this identifier to the record.
        required: true
      value:
        description: Value of the related identifier.
        required: true
