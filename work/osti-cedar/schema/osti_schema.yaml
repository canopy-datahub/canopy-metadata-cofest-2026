id: https://w3id.org/brc/osti_schema
name: osti_schema
title: LinkML schema of OSTI Submission Metadata
description: >-
  This schema is a LinkML representation of the OSTI Submission Metadata
  schema, as described here:
  https://www.osti.gov/elink2api/
  and here:
  https://www.osti.gov/elink2api/record-schema
  OSTI uses the E-Link API infrastructure.
  This schema corresponds to the E-Link 2.0 API (2.13.0).
  It also contains some deprecated fields to support
  backward compatibility with older records (e.g., article_type
  has been replaced by product_type, but some records still
  use the former).
version: "2.13.0"
prefixes:
  linkml: https://w3id.org/linkml/
  osti: https://www.osti.gov/biblio/

default_prefix: osti
default_range: string

imports:
  - linkml:types

classes:
  records:
    description: >-
      A list of Record metadata.
    tree_root: true
    attributes:
      records:
        description: List of records in the collection.
        range: Record
        multivalued: true

  Record:
    description: >-
      Defines the bibliographic metadata about a particular work or record.
      Depending on product type, various elements are permitted, not permitted,
      or required.
    attributes:
      osti_id:
        description: >-
          Unique identifier for OSTI record, only required for updates.
        range: integer
        identifier: true
        examples:
          - value: "9999"
      identifiers:
        description: >-
          List of identifying numbers related to this record
        range: Identifier
        multivalued: true
      issue:
        description: >-
          Issue number for journals or other applicable products if any.
        range: string
        examples:
          - value: "44"
        pattern: "^.{0,80}$"
      journal_license_url:
        description: >-
          URL for information regarding the journal license for information
        range: string
        examples:
          - value: "https://journal-publishers.com/license/3.02/text"
        pattern: "^.{0,255}$"
      journal_name:
        description: >-
          Name of journal publishing this information
        range: string
        examples:
          - value: "Proceedings of the National Academy of Sciences"
        pattern: "^.{0,250}$"
      journal_open_access_flag:
        description: >-
          Indicates if the journal article is available in an open access
          journal, indicated as Y for open, N for not, or left blank/omitted
          if not applicable or unknown status.
        range: string
        pattern: "^.{0,1}$"
        examples:
          - value: "N"
      journal_type:
        description: >-
          Specific sub-type of the journal article.  For product type JA only.
          Further qualifies the type of record.
        range: string
        examples:
          - value: "AM"
        pattern: "^.{0,2}$"
      revision:
        description: >-
          Revision number (sequence) for this record.
        range: integer
        examples:
          - value: "1"
        # readOnly: true
      workflow_status:
        description: >-
          Workflow status of current revision of record.
        range: WorkflowStatusEnum
        examples:
          - value: "SO"
      access_limitations:
        description: >-
          Access/distribution limitation codes to describe the
          distribution rules and limitations for this work.
        range: AccessLimitationsEnum
        multivalued: true
        required: true
        examples:
          - value: "UNL"
          - value: "OPN"
        pattern: "^.{0,5}$"
      access_limitation_other:
        description: >-
          Additional information about access/distribution limitation for this record,
          if needed. Required for CUI or PDOUO designations in access limitation.
          May contain information about the following: Special handling instructions,
          Copyright restrictions, Other criteria pertinent to the review, access
          limitation, announcement, and/or restriction of this STI product.
        range: string
        examples:
          - value: "Restricted to US Distribution Only by DOE Order."
      cui_basic_categories:
        description: >-
          For CUI marked records, one or more CUI "Basic" category code
          indicators. See examples in OSTI online help
          (https://www.osti.gov/elink/help#cui-categories).
        range: string
        multivalued: true
      cui_specified_categories:
        description: >-
          For CUI marked records, one or more CUI "Specified" category code
          indicators. See examples in OSTI online help
          (https://www.osti.gov/elink/help#cui-categories).
        range: string
        multivalued: true
      cui_limited_dissemination_controls:
        description: >-
          For CUI marked records, one or more CUI limited dissemination
          control code indicators.
        range: string
        multivalued: true
      added_by:
        description: >-
          E-Link user ID that initially entered this record.
          Value internally maintained by E-Link.
        range: integer
        examples:
          - value: "28931"
        # readOnly: true
      added_by_email:
        description: >-
          E-Link account email address initially entering this record.
          Value maintained by E-Link.
        range: string
        examples:
          - value: "ensorn@osti.gov"
      added_by_name:
        description: >-
          E-Link user name initially entering this record.
          Value maintained by E-Link.
        range: string
        examples:
          - value: "Neal Ensor"
      added_by_pams_user_id:
        description: >-
          (PAMS Only) PAMS registered user ID that entered this record.
        range: string
        examples:
          - value: "3ab33f88-7699-44c9-9668-a370c09646e5"
      announcement_codes:
        description: >-
          List of announcement codes for this record.
        range: string
        examples:
          - value: "EDB"
          - value: "INIS"
        multivalued: true
      edition:
        description: >-
          Edition number, as applicable to Books or other products.
        range: string
        examples:
          - value: "2023"
        pattern: "^.{0,10}$"
      volume:
        description: >-
          A volume number as applicable, usually for journals or books.
        range: string
        examples:
          - value: "1"
        pattern: "^.{0,68}$"
      collection_type:
        description: >-
          Indicates the OSTI collection type originally creating this record.
          Maintained internally by E-Link.
        range: CollectionTypeEnum
        examples:
          - value: "DOE_LAB"
        # readOnly: true
      conference_information:
        description: >-
          "Describes the conference pertaining to this record, if any; usually name
          and / or location the event took place.""
        range: string
        examples:
          - value: "ApacheCON 2019 discussion panel"
      conference_type:
        description: >-
          Code representing the type of conference-related work of this record.
          Generally, only applicable to CO type submissions.
        range: string
        examples:
          - value: "O"
        pattern: "^.{0,1}$"
      conference_title:
        description: >-
          Title of the conference.
        range: string
        examples:
          - value: "ApacheCON 2019 Developer Conference"
        pattern: "^.{0,2000}$"
      conference_location:
        description: >-
          Location of the conference.
        range: string
        examples:
          - value: "Atlanta, GA"
        pattern: "^.{0,2000}$"
      conference_date:
        description: >-
          Date conference took place.
        range: string
        examples:
          - value: "13-15 October 2026"
        pattern: "^.{0,200}$"
      contract_award_date:
        description: >-
          Date contract for this record was awarded.
        range: date
        examples:
          - value: "2012-02-19"
      country_publication_code:
        description: >-
          Country of publication for this record
        range: string
        examples:
          - value: "US"
        pattern: "^.{0,5}$"
      dataset_type:
        description: >-
          If submitted dataset is Instrument-based data, you may specify
          "Instrument" in this field.
        range: DatasetTypeEnum
        examples:
          - value: "Instrument"
      dataset_content:
        description: >-
          Optional for datasets, to describe the content or basis of the
          information contained within this data set.
        range: string
        pattern: "^.{0,2000}$"
      date_metadata_added:
        description: >-
          Date record first entered the OSTI system. Value internally
          maintained by E-Link.
        range: datetime
        examples:
          - value: "2023-09-22T18:31:32.043Z"
        # readOnly: true
      date_metadata_updated:
        description: >-
          Date of this revision of the record. Value internally
          maintained by E-Link.
        range: datetime
        examples:
          - value: "2020-04-02T12:33:17.553Z"
        # readOnly: true
      date_submitted_to_osti_first:
        description: >-
          Date record was first submitted to OSTI for publication.
          Maintained internally by E-Link.
        range: datetime
        examples:
          - value: "2019-04-04T08:25:12.234Z"
        # readOnly: true
      date_submitted_to_osti_last:
        description: >-
          Most recent date record information was submitted to OSTI.
          Maintained internally by E-Link.
        range: datetime
        examples:
          - value: "2018-05-04T11:44:23.864Z"
        # readOnly: true
      date_released_first:
        description: >-
          Date record was first released/published in OSTI.
          Maintained internally by E-Link.
        range: datetime
        examples:
          - value: "2025-08-25T21:20:58.633000+00:00"
        # readOnly: true
      date_released_last:
        description: >-
          Most recent date record was released/published in OSTI.
          Maintained internally by E-Link.
        range: datetime
        examples:
          - value: "2025-08-25T21:20:58.633000+00:00"
        # readOnly: true
      title:
        description: >-
          Title of record.  For Book Chapters, the title of the chapter.
        range: string
        required: true
        examples:
          - value: "Sample document title"
      description:
        description: >-
          Description or abstract for this record. Required to have a value
          for grantee submissions.
        range: string
        examples:
          - value: "Information about a particular record, report, or other document, or executive summary or abstract of same."
      descriptors:
        description: >-
          List of descriptor codes for this record
        range: string
        examples:
          - value: "ATMOSPHERE"
          - value: "ELECTRONS"
        multivalued: true
      doe_funded_flag:
        description: >-
          Indicates if the record is primarily DOE-funded. Indicate Y for
          Yes, N for no, or leave blank/omit if unknown status.
        range: string
        pattern: "^.{0,1}$"
        examples:
          - value: "Y"
      doi:
        description: >-
          The DOI for this record, if any.  Enter value if previously
          assigned a DOI for the record from an outside service.  If
          not supplied, OSTI may assign a DOI for the work for certain
          applicable record types.
        range: string
        examples:
          - value: "10.5072/2020/238479ax"
      doi_infix:
        description: >-
          "Any customized infix value for the DOI used when generating
          a DOI reference. The following characters should be avoided
          in the infix value: ;/?:@&=+$,."
        range: string
        examples:
          - value: "Climate2019"
      edited_by:
        description: >-
          OSTI user ID making this revision of the metadata record.
          Value internally maintained by E-Link.
        range: integer
        # readOnly: true
        examples:
          - value: "112389"
      edited_by_email:
        description: >-
          E-Link user email address that created this revision of the metadata record.
          Value maintained by E-Link.
        range: string
        examples:
          - value: "harrisonm@site.gov"
      edited_by_name:
        description: >-
          E-Link user name that created this revision of the metadata record.
          Value maintained by E-Link.
        range: string
        examples:
          - value: "Mark Harrison"
      edited_by_pams_user_id:
        description: >-
          (PAMS Only) PAMS user ID that created this revision of the metadata record.
        range: string
      edit_reason:
        description: >-
          Value provided by user editing a record describing the reason for the edit.
        range: string
        examples:
          - value: "Modified title and authors."
      edit_source:
        description: >-
          Value determined based on type of edit and user performing the association.
        range: string
        # readOnly: true
        examples:
          - value: "NORMAL_WEBFORM"
      format_information:
        description: >-
          Information about the format of the product, including any operating system
          or program requirements for use of the data, as applicable.
        range: string
        examples:
          - value: "Originally Word Perfect 4.2 document"
      media_embargo_sunset_date:
        # Note: example is not in ISO-8601 format, so is
        # handled as a string
        description: >-
          Indicates date on which the document embargo ends, if applicable.
        range: string
        examples:
          - value: "7/6/2022"
      publication_date:
        description: >-
          Date of publication of this record.  For Thesis/Dissertation records,
          this may also be the completion date of the Thesis.  For Patents, the
          date the patent was issued or approved.
        range: date
        required: true
        examples:
          - value: "2009-06-12"
      publication_date_text:
        description: >-
          String representation of the publication date (e.g., Summer 2001)
        range: string
        examples:
          - value: "Winter 2012"
      publisher_information:
        description: >-
          Publisher-specific information if applicable
        range: string
        examples:
          - value: "University Press, Volume III Spring 2001"
        pattern: "^.{0,400}$"
      record_category:
        description: >-
          Value calculated by OSTI for application distribution for most recently
          released revision of this record. Maintained internally by E-Link.
        range: integer
        examples:
          - value: "100"
      related_doc_info:
        # deprecated: true
        description: >-
          Additional information regarding the document.  Considered historical
          or deprecated information, provided for access to historical data.
          This field is NOT recommended for new submissions.
        range: string
        examples:
          - value: "Reprint Spring 2012"
        pattern: "^.{0,2255}$"
      keywords:
        description: >-
          Concise set of key words for this record
        range: string
        multivalued: true
        examples:
          - value: "NUCLEAR"
          - value: "REACTIONS"
      languages:
        description: >-
          Language codes for this record
        multivalued: true
        range: string
        examples:
          - value: "English"
      audit_logs:
        description: >-
          Listing of any audit logs of actions taken and worker
          interactions performed on this metadata revision, if any.
        range: AuditLog
        multivalued: true
        # readOnly: true
      media:
        description: >-
          Listing of any media and files associated with this record,
          along with various metadata information and status data for
          each.  Empty if no media is currently associated with this
          record.
        range: MediaSet
        multivalued: true
        # readOnly: true
      opn_addressee:
        description: >-
          For OpenNET records, the addressee information
        range: string
        examples:
          - value: "Forestall Bldg A-113"
      opn_declassified_date:
        # Note: example is not in ISO-8601 format, so is
        # handled as a string
        description: >-
          For OpenNET records, the date information was declassified
        range: string
        examples:
          - value: "03/02/2018"
      opn_declassified_status:
        description: >-
          For OpenNET records, status of declassification of information
        range: string
        examples:
          - value: "N"
      opn_document_categories:
        description: >-
          For OpenNET records, list of any document categories pertaining
          to this record
        range: string
        multivalued: true
        examples:
          - value: "Chemistry"
          - value: "Geothermal"
      opn_document_location:
        range: string
        examples:
          - value: "US Department of Science, Office 201"
      opn_fieldoffice_acronym_code:
        range: string
        examples:
          - value: "THX-1138"
        pattern: "^.{0,10}$"
      organizations:
        description: >-
          List of organizations related to this record. For submissions,
          at least SPONSOR and RESEARCHING organization is required.
        range: Organization
        multivalued: true
      other_information:
        description: >-
          Information useful to include in published announcements which is
          not suited for other fields.
        range: string
        multivalued: true
        examples:
          - value: "Published in Nature, Fall 2012"
      ouo_release_date:
        # Note: example is not in ISO-8601 format, so is
        # handled as a string
        description: >-
          Date of OUO access limitation expiration if applicable.
        range: string
        examples:
          - value: "1997-05-09 10:23:44"
      paper_flag:
        description: >-
          Indicates if OSTI has or had a paper copy of this product.
        range: boolean
        examples:
          - value: "true"
      hidden_flag:
        description: >-
          Indicates if the record is hidden from public view.
        range: boolean
        examples:
          - value: "false"
      sensitivity_flag:
        description: >-
          Indicates the sensitivity classification of the record (e.g., U for Unclassified).
        range: string
        examples:
          - value: "U"
      doe_supported_flag:
        description: >-
          Indicates if the work was supported by DOE funding.
        range: boolean
        examples:
          - value: "false"
      peer_reviewed_flag:
        description: >-
          Indicates if the work was peer-reviewed.
        range: boolean
        examples:
          - value: "false"
      patent_assignee:
        description: >-
          The holder of property rights to a patent.
        range: string
        examples:
          - value: "United Property Holdings, LLC"
      patent_file_date:
        description: >-
          Date patent was filed with US Patent Office.
        range: date
        examples:
          - value: "2018-04-08"
      patent_priority_date:
        range: date
        examples:
          - value: "2004-07-12"
      pdouo_exemption_number:
        description: >-
          Exception number for PDOUO access limitation records.
          Multiple values may be delimited by semi-colons.
        range: string
        examples:
          - value: "278324"
      persons:
        description: >-
          List of persons (authors, contributors, etc.) related to this record.
          For submissions, at least one AUTHOR or CONTRIBUTING Person, along
          with a RELEASE contact, is required.
        range: Person
        multivalued: true
      product_size:
        description: >-
          Information regarding physical size of media or report, if applicable.
        range: string
        examples:
          - value: "227 pages"
        pattern: "^.{0,50}$"
      product_type:
        range: ProductType
        pattern: "^.{0,2}$"
      product_type_other:
        description: >-
          Additional information for 'OTHER' product types.  Required if 'OT'
          product type is specified for this record.
        range: string
        examples:
          - value: "Preprint"
        pattern: "^.{0,200}$"
      prot_flag:
        description: >-
          Indicates the type of protected data described by this record.
          PROT must be specified in the access limitations.
        range: string
        examples:
          - value: "EPACT"
        pattern: "^.{0,5}$"
      prot_data_other:
        description: >-
          Information regarding why the information is protected if not a
          CRADA product.
        range: string
        examples:
          - value: "PROTECTED"
        pattern: "^.{0,80}$"
      prot_release_date:
        description: >-
          The date on which data protections for this record will end.
        range: date
        examples:
          - value: "2023-07-23"
      availability:
        description: >-
          Describes record's availibility information.
        range: string
        examples:
          - value: "Also available at https://sample.com/document/report.pdf"
      subject_category_code:
        description: >-
          Set two-character subject category code values for this record.
          See SubjectCategoryEnum for the controlled list of codes and names.
        range: string
        examples:
          - value: "2"
          - value: "31"
        multivalued: true
        pattern: "^.{0,2}$"
      subject_category_code_legacy:
        description: >-
          Any legacy or historical subject category codes for this report
        range: string
        examples:
          - value: "Political Science"
          - value: "Geosciences"
          - value: "Physics"
        multivalued: true
      related_identifiers:
        description: >-
          List of related identifiers connected to this record
        range: RelatedIdentifier
        multivalued: true
      released_to_osti_date:
        description: >-
          Date record information was released to OSTI, as entered
          by releasing official.
        range: date
        examples:
          - value: "2019-06-03"
      releasing_official_comments:
        description: >-
          Any comments made by the releasing official on the record.
        range: string
        examples:
          - value: "Final report due January 2021."
      report_period_end_date:
        range: date
        examples:
          - value: "2023-01-14"
      report_period_start_date:
        range: date
        examples:
          - value: "2023-01-05"
      report_types:
        description: >-
          The type(s) of information or frequency of reporting of
          information in this report.
        range: string
        multivalued: true
        examples:
          - value: "F"
          - value: "B"
      report_type_other:
        description: >-
          Detail information about 'Other' report types.
        range: string
        examples:
          - value: "OTHERVALUE"
        pattern: "^.{0,80}$"
      sbiz_flag:
        description: >-
          Indicates if this metadata is SBIR or STTR related.
        range: string
        pattern: "^.{0,6}$"
        examples:
          - value: "SBIR"
          - value: "STTR"
      sbiz_phase:
        description: >-
          A three-character field constrained to 'I', 'II', 'IIA',
          'IIB', or 'III' indicating the phase of this SBIR/STTR report.
        range: string
        pattern: "^.{0,3}$"
        examples:
          - value: "IIB"
      sbiz_previous_contract_number:
        description: >-
          The previous SBIR/STTR contract number if a Phase III SBIR/STTR
          report.
        range: string
        examples:
          - value: "SMPL-2023-1291"
        pattern: "^.{0,14}$"
      sbiz_release_date:
        description: >-
          Date data protections on this SBIR/STTR record will expire.
        range: date
      site_ownership_code:
        description: >-
          Code of the DOE site submitting this document
        range: string
        examples:
          - value: "BNL"
        pattern: "^.{0,10}$"
      site_unique_id:
        description: >-
          Site-specified unique accession number for this record
        range: string
        examples:
          - value: "89345"
      site_url:
        description: >-
          (DATASET product type only) The URL of the data set landing
          page, containing links to data set content or additional
          information as required.
        range: string
      source_input_type:
        description: >-
          Value determined by submission type at record creation time.
          Defines how E-Link record was first entered into the system.
        range: string
        examples:
          - value: "DOE_GRANT_WEBFORM"
        # readOnly: true
      source_edit_type:
        description: >-
          Value determined by submission type for each edit or revision
          of a record. Changes on a per-revision basis.
        range: string
        examples:
          - value: "DOE_LAB_API"
        # readOnly: true
      geolocations:
        description: >-
          List of geolocation references for this record.
        range: Geolocation
        multivalued: true
      article_type:
        # deprecated: true
        description: >-
          Article type code for journal articles.  Considered historical
          or deprecated information, provided for access to historical data.
          This field is NOT recommended for new submissions; use product_type
          instead.
        range: string
        examples:
          - value: "Accepted Manuscript"
      authors:
        # deprecated: true
        description: >-
          List of authors for this record.  Considered historical
          or deprecated information, provided for access to historical data.
          This field is NOT recommended for new submissions; use persons
          instead.
        range: string
        examples:
          - value: "Smith, John"
          - value: "Doe, Jane"
        multivalued: true
      conference_info:
        # deprecated: true
        description: >-
          Additional information regarding a conference.  Considered historical
          or deprecated information, provided for access to historical data.
          This field is NOT recommended for new submissions; use
          conference_information instead.
        range: string
        examples:
          - value: "Presented at ApacheCON 2019"
        pattern: "^.{0,255}$"
      contract_number:
        # deprecated: true
        description: >-
          DOE contract number related to this record.  Considered historical
          or deprecated information, provided for access to historical data.
          This field is NOT recommended for new submissions; use identifiers
          from Identifier class instead.
        range: string
        examples:
          - value: "AC02-05CH11231"
      country_publication:
        # deprecated: true
        description: >-
          Country of publication for this record.  Considered historical
          or deprecated information, provided for access to historical data.
          This field is NOT recommended for new submissions; use
          country_publication_code instead.
        range: string
        examples:
          - value: "United States"
      doe_contract_number:
        # deprecated: true
        description: >-
          DOE contract number related to this record.  Considered historical
          or deprecated information, provided for access to historical data.
          This field is NOT recommended for new submissions; use identifiers
          from Identifier class instead.
        range: string
        examples:
          - value: "AC02-05CH11231"
      entry_date:
        # deprecated: true
        description: >-
          Date record first entered the OSTI system.  Considered historical
          or deprecated information, provided for access to historical data.
          This field is NOT recommended for new submissions; use
          date_metadata_added instead.
        range: datetime
        examples:
          - value: "2023-09-22T18:31:32.043Z"
      identifier:
        # deprecated: true
        description: >-
          Various identifying numbers related to this record.  Considered
          historical or deprecated information, provided for access to
          historical data. This field is NOT recommended for new submissions;
          use identifiers from Identifier class instead.
        range: string
        examples:
          - value: "9234782"
        multivalued: true
      language:
        # deprecated: true
        description: >-
          Language codes for this record.  Considered historical or deprecated
          information, provided for access to historical data. This field is
          NOT recommended for new submissions; use languages instead.
        range: string
        examples:
          - value: "English"
        multivalued: true
      links:
        # deprecated: true
        description: >-
          Listing of any media and files associated with this record.
          Considered historical or deprecated information, provided for
          access to historical data. This field is NOT recommended for new
          submissions; use media instead.
        range: string
        examples:
          - value: "https://www.osti.gov/servlets/purl/1234567"
        multivalued: true
      other_identifiers:
        # deprecated: true
        description: >-
          Various identifying numbers related to this record.  Considered
          historical or deprecated information, provided for access to
          historical data. This field is NOT recommended for new submissions;
          use identifiers from Identifier class instead.
        range: string
        examples:
          - value: "9234782"
        multivalued: true
      other_number:
        # deprecated: true
        description: >-
          Various identifying numbers related to this record.  Considered
          historical or deprecated information, provided for access to
          historical data. This field is NOT recommended for new submissions;
          use identifiers from Identifier class instead.
        range: string
        examples:
          - value: "9234782"
        multivalued: true
      report_number:
        # deprecated: true
        description: >-
          Various identifying numbers related to this record.  Considered
          historical or deprecated information, provided for access to
          historical data. This field is NOT recommended for new submissions;
          use identifiers from Identifier class instead.
        range: string
        examples:
          - value: "9234782"
        multivalued: true
      research_orgs:
        # deprecated: true
        description: >-
          List of researching organizations related to this record.
          Considered historical or deprecated information, provided for
          access to historical data. This field is NOT recommended for new
          submissions; use organizations instead.
        range: string
        examples:
          - value: "Argonne National Laboratory"
          - value: "Lawrence Berkeley National Laboratory"
        multivalued: true
      sponsor_orgs:
        # deprecated: true
        description: >-
          List of sponsoring organizations related to this record.
          Considered historical or deprecated information, provided for
          access to historical data. This field is NOT recommended for new
          submissions; use organizations instead.
        range: string
        examples:
          - value: "U.S. Department of Energy"
          - value: "National Science Foundation"
        multivalued: true
      subjects:
        # deprecated: true
        description: >-
          List of descriptor codes for this record.  Considered historical
          or deprecated information, provided for access to historical data.
          This field is NOT recommended for new submissions; use
          subject_category_code instead.
        range: string
        examples:
          - value: "ATMOSPHERE"
          - value: "ELECTRONS"
        multivalued: true
      journal_issn:
        # deprecated: true
        description: >-
          International Standard Serial Number (ISSN) for the journal
          publishing this record.  Considered historical or deprecated
          information, provided for access to historical data. This field
          is NOT recommended for new submissions; use journal_name and
          identifiers from Identifier class instead.
        range: string
        examples:
          - value: "1234-5678"
        pattern: "^.{0,9}$"
      journal_issue:
        # deprecated: true
        description: >-
          Issue number for journals or other applicable products if any.
          Considered historical or deprecated information, provided for
          access to historical data. This field is NOT recommended for new
          submissions; use issue instead.
        range: string
        examples:
          - value: "44"
        pattern: "^.{0,80}$"
      journal_volume:
        # deprecated: true
        description: >-
          A volume number as applicable, usually for journals or books.
          Considered historical or deprecated information, provided for
          access to historical data. This field is NOT recommended for new
          submissions; use volume instead.
        range: string
        examples:
          - value: "1"
        pattern: "^.{0,68}$"
      publisher:
        # deprecated: true
        description: >-
          Publisher-specific information if applicable.  Considered historical
          or deprecated information, provided for access to historical data.
          This field is NOT recommended for new submissions; use
          publisher_information instead.
        range: string
        examples:
          - value: "University Press, Volume III Spring 2001"
        pattern: "^.{0,400}$"
      relation:
        # deprecated: true
        description: >-
          Identifies other resources that are related in some manner to this record.
          Considered historical or deprecated information, provided for access
          to historical data. This field is NOT recommended for new submissions;
          use the RelatedIdentifier class instead.
        range: string
        examples:
          - value: "IsSupplementTo"
        pattern: "^.{0,20}$"

  RelatedIdentifier:
    description: >-
      Identifies other resources that are related in some manner to this record
    attributes:
      type:
        description: >-
          Identify the type of this related identifier
        range: RelatedIdentifierType
        examples:
          - value: "DOI"
        required: true
      relation:
        range: RelationType
        required: true
        pattern: "^.{0,20}$"
      value:
        description: >-
          The value of the identifier
        range: string
        examples:
          - value: "10.11578/2020/28383"
        required: true
        pattern: "^.{0,2000}$"

  Geolocation:
    attributes:
      type:
        description: >-
          Describes the shape of this geolocation attribute.
          (Optional, type may be determined by examination of the points.)
          Single point in 'points' indicates this is a POINT; two points,
          indicating NW and SE location, indicate a BOX; any other number
          of points is assumed to be a POLYGON.  Note that POLYGONs should
          begin and end on the same point, in order to properly express a
          'closed polygon' shape.
        range: GeolocationType
        examples:
          - value: "POINT"
      label:
        description: >-
          Optional place name for this location or set of geolocation points.
        range: string
        examples:
          - value: "Maryland coastal waters"
      points:
        range: point
        required: true
        multivalued: true

  point:
    # Note: the schema uses a slot named "items" within the "points"
    # slot of Geolocation, so this may need some modifications
    # if it does not map correctly.
    # Note: the schema refers to these slots as integers, but
    # the examples are floats, so using float here.
    attributes:
      latitude:
        description: >-
          Latitude of this point in the geolocation; limited to -90 to 90,
          inclusive.
        range: float
        minimum_value: -90
        maximum_value: 90
        required: true
        examples:
          - value: "38.75096"
      longitude:
        description: >-
          Longitude of this point in the geolocation; limited to -180 to 180,
          inclusive.
        range: float
        minimum_value: -180
        maximum_value: 180
        required: true
        examples:
          - value: "-76.51239"

  Identifier:
    description: >-
      Values of various identifying numbers, such as DOE contract number,
      product numbers, ISBN, ISSN, and other various forms of identifying
      markings or numbers pertaining to the product or metadata.
    attributes:
      type:
        range: IdentifierType
      value:
        pattern: "^.{0,100}$"
        description: >-
          Value of this identifier
        range: string
        examples:
          - value: "9234782"

  AuditLog:
    description: >-
      Indicates status and information about back-end processing on a
      given metadata record.
    attributes:
      type:
        description: >-
          Indicates the source of the status message, generally the
          backend process performing the action in question.
        range: string
        examples:
          - value: "VALIDATOR"
      audit_date:
        description: >-
          Timestamp of the operation detailed in this audit log.
        range: datetime
        examples:
          - value: "2024-11-04T15:08:44.438Z"
      status:
        description: >-
          Indicates state or notification level of worker action
          detailed in this audit log.  Generally SUCCESS or FAIL,
          but may additionally indicate INFO, WARN, or ERROR status
          messages.
        range: string
        examples:
          - value: "SUCCESS"
      messages:
        description: >-
          One or more messages pertaining to the action taken or
          results of worker processing for this audit log.
        range: string
        multivalued: true
        examples:
          - value: "Validation Successful."

  MediaSet:
    description: >-
      Metadata about files associated with this product.  Summarizes
      the main media file associated with this product, usually an
      off-site URL or PDF uploaded to OSTI, with its state, URL if
      applicable, and other identifying state information pertaining
      to the media files as a group. Each media set is uniquely
      identified by its `MEDIA_ID` value.
    attributes:
      media_id:
        description: >-
          Unique ID for this MEDIA SET.
        range: integer
        examples:
          - value: "233743"
      revision:
        description: >-
          Revision number of this media association set.
        range: integer
        examples:
          - value: "3"
        # readOnly: true
      access_limitations:
        description: >-
          Access limitations are inherited from the parent metadata
          record at time of association.
        range: AccessLimitationsEnum
        multivalued: true
        examples:
          - value: "UNL"
        # readOnly: true
        pattern: "^.{0,5}$"
      osti_id:
        description: >-
          Links to Record OSTI_ID value for a Media Set.
        range: integer
        examples:
          - value: "99238"
        # readOnly: true
      status:
        description: >-
          Indicate the current processing of the media file set.
        range: string
        examples:
          - value: "P"
        # readOnly: true
      added_by:
        description: >-
          Indicates user ID that added this media set.
        range: integer
        examples:
          - value: "34582"
        # readOnly: true
      document_page_count:
        description: >-
          Number of pages, if applicable, found in the processing of
          this file.
        range: integer
        examples:
          - value: "23"
        # readOnly: true
      mime_type:
        description: >-
          MIME type description of the file content of this media file.
          This value is set by OSTI media processing.
        range: string
        examples:
          - value: "application/pdf"
        # readOnly: true
      media_title:
        description: >-
          Optional title provided for the given media set.
        range: string
        examples:
          - value: "PDF of technical report content"
        pattern: "^.{0,500}$"
      media_location:
        description: >-
          Indicates if this media set's main content is LOCAL or OFF-SITE.
        range: MediaLocationEnum
        examples:
          - value: "L"
        # readOnly: true
      media_source:
        description: >-
          Indicates the initial primary source of the media set.
        range: string
        examples:
          - value: "MEDIA_API_UPLOAD"
        # readOnly: true
      date_added:
        description: >-
          Date this media set was first created. (UTC)
        range: datetime
        examples:
          - value: "1992-03-08T11:23:44.123+00:00"
        # readOnly: true
      date_updated:
        description: >-
          Date this media set was most recently modified. (UTC)
        range: datetime
        examples:
          - value: "2009-11-05T08:33:12.231+00:00"
        # readOnly: true
      date_valid_end:
        description: >-
          If present, date and time when media association was
          removed or replaced. (UTC)
        range: datetime
        examples:
          - value: "2021-02-15T12:32:11.332+00:00"
        # readOnly: true
      files:
        description: >-
          Array of all files, including original submission of file
          or URL along with any derived files during processing of media.
        range: MediaFile
        multivalued: true

  MediaFile:
    description: >-
      Metadata information pertaining to a particular media resource
      associated with this product.  Contains information about its
      disposition, content, and processing state.  Each individual file
      is uniquely identified by its `MEDIA_FILE_ID` value.
    attributes:
      media_file_id:
        description: >-
          Unique identifier for a given MEDIA FILE.
        range: integer
        examples:
          - value: "983445"
        # readOnly: true
      media_id:
        description: >-
          Link to parent MEDIA SET ID.
        range: integer
        examples:
          - value: "233743"
      checksum:
        description: >-
          Calculated hash or checksum value of the physical file as
          applicable, from media processing.
        range: string
        examples:
          - value: "85a88fc60dab52214508631f3dd93f1ada3e6e8cd00d09a58608054d8e5ded38"
        # readOnly: true
      revision:
        description: >-
          Revision number of this media file, associated with the MEDIA SET
        range: integer
        examples:
          - value: "1"
        # readOnly: true
      parent_media_file_id:
        description: >-
          If non-zero, indicates unique MEDIA FILE ID this MEDIA FILE
          is derived from.
        range: integer
        examples:
          - value: "0"
        # readOnly: true
      status:
        description: >-
          Indiciates current processing status for this MEDIA FILE.
          Other values may indicate awaiting additional processing,
          such as 'OCR', pending text processing.
        range: string
        examples:
          - value: "DONE"
        # readOnly: true
      media_type:
        description: >-
          Indicates TYPE of media file, detected or set during media
          processing.
        range: string
        examples:
          - value: "T"
        # readOnly: true
        pattern: "^.{0,1}$"
      url_type:
        description: >-
          Indicates if the file is LOCALLY HOSTED ('L') or OFF-SITE URL ('O').
        range: MediaLocationEnum
        examples:
          - value: "L"
        # readOnly: true
        pattern: "^.{0,1}$"
      url:
        description: >-
          Either the file name for local files, or URL path to off-site resource.
        range: string
        examples:
          - value: "report.pdf"
        pattern: "^.{0,255}$"
      mime_type:
        description: >-
          Mime type describing the MEDIA FILE content.
        range: string
        examples:
          - value: "application/pdf"
        # readOnly: true
      added_by_user_id:
        description: >-
          Indicates the E-Link USER ID that attached this MEDIA FILE.
        range: integer
        examples:
          - value: "118678"
        # readOnly: true
      media_source:
        description: >-
          Describes method of file production or association with this media set.
        range: string
        examples:
          - value: "TEXT_FILE_EXTRACTION"
        # readOnly: true
      file_size_bytes:
        description: >-
          If local file, the file size in bytes.
        range: integer
        examples:
          - value: "993834"
        # readOnly: true
      duration_seconds:
        description: >-
          For audio-visual media, the duration of the resource in seconds.
        range: integer
        examples:
          - value: "77"
        # readOnly: true
      document_page_count:
        description: >-
          For document-based media, the number of printed pages if applicable.
        range: integer
        examples:
          - value: "22"
        # readOnly: true
      subtitle_tracks:
        description: >-
          Indicates the number of subtitle tracks for audio-visual media.
        range: integer
        examples:
          - value: "2"
        # readOnly: true
      video_tracks:
        description: >-
          Indicates the number of video tracks in audio-visual media.
        range: integer
        examples:
          - value: "1"
        # readOnly: true
      pdf_version:
        description: >-
          For PDF media files, indicates the version of PDF.
        range: string
        examples:
          - value: "1.5"
        # readOnly: true
      pdfa_conformance:
        description: >-
          For PDF media that is PDF/A compliant, the conformance level, generally A, B, or U.
        range: string
        examples:
          - value: "A"
        # readOnly: true
      pdfa_part:
        description: >-
          For PDF media that is PDF/A compliant, the level of compliance, as a value between 1 and 4.
        range: string
        examples:
          - value: "1"
        # readOnly: true
      pdfua_part:
        description: >-
          For PDF media that is PDF/UA compliant, its compliance level, generally 1 or 2.
        range: string
        examples:
          - value: "2"
        # readOnly: true
      processing_exceptions:
        description: >-
          If present, the reason why media processing failed, or description of
          problem encountered processing this particular file.
        range: string
        examples:
          - value: "Source PDF file is encrypted."
      date_file_added:
        description: >-
          Indicates the date and time this media file was created.
        range: datetime
        examples:
          - value: "2012-08-33T15:33:22.504+00:00"
        # readOnly: true
      date_file_updated:
        description: >-
          Indicates the last date and time this media file was modified.
        range: datetime
        examples:
          - value: "2013-04-22T18:33:28.234+00:00"
        # readOnly: true

  Organization:
    # Note: either name or ror_id are required
    description: >-
      Describes a particular organization associated with the bibliographic record.
      Organizations may be author collaborations, sponsors, research laboratories,
      or contributors to the work, as indicated by their associated type.
      For identification purposes, at least one of either 'name' or 'ror_id' is
      required for validation.  If ROR ID is specified, it will be validated against
      the ROR authority at OSTI.
    attributes:
      type:
        range: OrganizationType
        required: true
        pattern: "^.{0,20}$"
      name:
        description: >-
          Name of the organization
        range: string
        required: true
        examples:
          - value: "Quantum Physics of America, Inc."
        pattern: "^.{0,800}$"
      contributor_type:
        description: >-
          Indicate the contribution made by this Organization.  Required for CONTRIBUTING 'type'.
        range: ContributorType
        examples:
          - value: "DataCollector"
        pattern: "^.{0,25}$"
      ror_id:
        description: >-
          ROR ID for this organization, if any. This value will be validated against the ROR authority.
        range: string
        examples:
          - value: "31478740"
      identifiers:
        description: >-
          List of any identifiers for this Organization.  Only applicable to Sponsoring organizations.
        range: OrganizationIdentifier
        multivalued: true

  OrganizationIdentifier:
    description: >-
      One or more identifying numbers or references associated with this organization.  Please note
      that only sponsoring organizations may have associated identifier values.
    attributes:
      type:
        range: OrganizationIdentifierType
        required: true
        examples:
          - value: "AWARD_DOI"
        pattern: "^.{0,20}$"
      value:
        description: >-
          Indicates the value of this identifier.  May be validated according to its particular type.
        range: string
        required: true
        examples:
          - value: "10.11578/289342"

  Person:
    description: >-
      Information about a particular person involved in the production or maintenance of this record
    attributes:
      type:
        range: PersonType
        required: true
        pattern: "^.{0,20}$"
      first_name:
        description: >-
          First (or 'Given') name of the person
        range: string
        examples:
          - value: "Sample"
        pattern: "^.{0,50}$"
      middle_name:
        description: >-
          Middle name or initial of the person
        range: string
        examples:
          - value: "Q."
        pattern: "^.{0,50}$"
      last_name:
        description: >-
          Last (or 'Family') name of this person
        range: string
        examples:
          - value: "Person"
        pattern: "^.{0,60}$"
      email:
        description: >-
          List of any email address(es) associated with this person.
          Email addresses are validated to be well-formed.
        range: string
        multivalued: true
        examples:
          - value: "persons@sample.org"
      orcid:
        description: >-
          ORCID (https://orcid.org/) value for this person.
          ORCID values, if provided, must be of valid format.
        range: string
        examples:
          - value: "0000-0001-2345-6789"
      phone:
        description: >-
          Contact phone number for this person, if available.
          If provided, must be a valid phone number expression.
        range: string
        examples:
          - value: "(555) 860-9923"
        pattern: "^.{0,30}$"
      osti_user_id:
        description: >-
          OSTI-assigned identifier for this person, if any
        range: integer
      contributor_type:
        range: ContributorType
        pattern: "^.{0,25}$"
      affiliations:
        # Note: Affiliation is not the same as Organization
        # and is specific to this version of the schema,
        # as the source schema uses a nested class definition
        description: >-
          List of any affiliations for this person.  At least one of either
          'name' and/or 'ror_id' is required; if ROR ID is provided, the
          value will be validated against the OSTI ROR authority.
        range: Affiliation
        multivalued: true

  Affiliation:
    # Note: this class is specific to this version of the schema,
    # as the source schema uses a nested class definition
    # within the Person class.
    # Note: either name or ror_id are required
    description: >-
      An affiliation for a person, such as an organization or institution.
    attributes:
      name:
        description: >-
          Name of the institution or laboratory with which this person is affiliated.
        range: string
        examples:
          - value: "Dutch Industries Research Laboratory, Oakland, CA"
      ror_id:
        description: >-
          ROR ID of this affiliation, if any.  Will be validated against ROR
          organization authority if present.
        range: string
        examples:
          - value: "02x0wxr53"

enums:
  ContributorType:
    description: >-
      Describes the type of contribution to the work.  Required for Persons or
      Organizations of CONTRIBUTING type.
    permissible_values:
      Chair:
      DataCollector:
        description: >-
          Person/institution responsible for finding or gathering data under the
          guidelines of the author(s) or Principal Investigator.
      DataCurator:
        description: >-
          Person tasked with reviewing, enhancing, cleaning, or standardizing
          metadata and the associated data submitted.
      DataManager:
        description: >-
          Person (or organization with a staff of data managers, such as a data
          centre) responsible for maintaining the finished resource.
      Distributor:
        description: >-
          Institution tasked with responsibility to generate/disseminate copies
          of the resource in either electronic or print form.
      Editor:
        description: >-
          A person who oversees the details related to the publication format of
          the resource.
      HostingInstitution:
        description: >-
          The organization allowing the resource to be available on the
          internet.
      Producer:
        description: >-
          Typically a person or organization responsible for the artistry and
          form of a media product.
      ProjectLeader:
        description: >-
          Person officially designated as head of project team instrumental in
          the work necessary to development of the resource.
      ProjectManager:
        description: >-
          Person officially designated as manager of a project. Project may
          consist of one or many project teams and sub-teams.
      ProjectMember:
        description: >-
          Person on the membership list of a designated project/project team.
      Reader:
      RegistrationAgency:
        description: >-
          Institution officially appointed by a Registration Authority to handle
          specific tasks within a defined area of responsibility.
      RegistrationAuthority:
        description: >-
          A standards-setting body from which Registration Agencies obtain
          official recognition and guidance.
      RelatedPerson:
        description: >-
          Person with no specifically defined role in the development of the
          resource, but who is someone the author wishes to recognize.
      Reviewer:
      ReviewAssistant:
      ReviewerExternal:
      RightsHolder:
        description: >-
          Person or institution owning or managing property rights, including
          intellectual property rights over the resource.
      StatsReviewer:
      Supervisor:
        description: >-
          Designated administrator over one or more groups working to produce a
          resource or over one or more steps of development process.
      Translator:
      WorkPackageLeader:
        description: >-
          A Work Package is a recognized data product, not all of which is
          included in publication.
      Other:
        description: >-
          Any person or institution making a significant contribution, but whose
          contribution does not "fit".

  RelatedIdentifierType:
    description: >
      Identify the type of this related identifier
    permissible_values:
      ARK:
      arXiv:
      bibcode:
      CSTR:
      DOI:
      EAN13:
      EISSN:
      IGSN:
      ISBN:
      ISSN:
      ISTC:
      Handle:
      LISSN:
      LSID:
      OTHER:
      PMCID:
      PMID:
      PURL:
      RRID:
      UPC:
      URI:
      URL:
      URN:
      UUID:
      w3id:

  RelationType:
    description: >
      Indicates the relationship between this identifier and the source record.
    permissible_values:
      BasedOnData:
      Cites:
        description: indicates that A includes B in a citation
      Compiles:
        description: >-
          indicates B is the result of a compile or creation event using A
      Continues:
        description: indicates A is a continuation of the work B
      Describes:
      Documents:
        description: indicates A is documentation about B
      Finances:
      HasComment:
      HasDerivation:
      HasMetadata:
        description: indicates resource A has additional metadata B
      HasPart:
        description: indicates A includes the part B
      HasRelatedMaterial:
      HasReply:
      HasReview:
      HasVersion:
      IsBasedOn:
      IsBasisFor:
      IsCitedBy:
        description: indicates that B includes A in a citation
      IsCommentOn:
      IsCompiledBy:
        description: indicates B is used to compile or create A
      IsContinuedBy:
        description: indicates A is continued by the work B
      IsDataBasisFor:
      IsDerivedFrom:
        description: indicates B is a source upon which A is based
      IsDescribedBy:
      IsDocumentedBy:
        description: indicates B is documentation about/explaining A
      IsFinancedBy:
      IsIdenticalTo:
        description: >-
          indicates that A is identical to B, for use when there is a need to
          register two separate instances of the same resource
      IsMetadataFor:
        description: indicates additional metadata A for a resource B
      IsNewVersionOf:
        description: >-
          indicates A is a new edition of B, where the new edition has been
          modified or updated
      IsObsoletedBy:
        description: indicates that A is obsoleted by B
      IsOriginalFormOf:
        description: indicates A is the original form of B
      IsPartOf:
        description: >-
          indicates A is a portion of B; may be used for elements of a series
      IsPreviousVersionOf:
        description: indicates A is a previous edition of B
      IsReferencedBy:
        description: indicates A is used as a source of information by B
      IsRelatedMaterial:
      IsReplyTo:
      IsRequiredBy:
      IsReviewedBy:
        description: indicates that A is reviewed by B
      IsReviewOf:
      IsSourceOf:
        description: indicates A is a source upon which B is based
      IsSupplementedBy:
        description: indicates that B is a supplement to A
      IsSupplementTo:
        description: indicates that A is a supplement to B
      IsVariantFormOf:
        description: >-
          indicates A is a variant or different form of B, e.g. calculated or
          calibrated form or different packaging
      IsVersionOf:
      Obsoletes:
        description: indicates that A obsoletes B
      References:
        description: indicates B is used as a source of information for A
      Requires:
      Reviews:
        description: indicates that A is a review of B

