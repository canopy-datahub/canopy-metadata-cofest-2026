- osti_id: 3027336
  title: AmeriFlux FLUXNET-1F US-UiA University of Illinois Switchgrass
  description: This is the AmeriFlux Management Project (AMP) created FLUXNET-1F version of the carbon
    flux data for the site US-UiA University of Illinois Switchgrass. This is the FLUXNET version of the
    carbon flux data for the site US-UiA University of Illinois Switchgrass produced by applying the standard
    ONEFlux (1F) software. Site Description - Field was treated with Potash, lime and diammonium phosphate
    before planting. Herbicide application included 2,4-D for 2008, 2009. 56 kg/ha nitrogen applied in
    2010, 2011, 2012, 2013, 2014, 2016. Measurements were suspended on June 14, 2016 and resumed on May
    28, 2024.
