  resource_name:
    value: KG-Registry
  description:
    value: "A registry of Knowledge Graphs, their data sources, and the ways they fit together. KG-Registry catalogs knowledge graphs and their components — Resources (top-level knowledge graph entries) and Products (specific representations such as APIs or visualizations) — using a YAML-based data format, a web interface for browsing, SQL-based search powered by DuckDB, and command-line tools for data management. It also supports an agent-assisted curation workflow and publication reference validation."
